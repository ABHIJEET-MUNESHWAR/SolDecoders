services:
  soldecoders:
    build: .
    image: soldecoders:latest
    ports:
      - "8080:8080"
    environment:
      RUST_LOG: info
      SOLDECODERS_LOG_JSON: "true"
    command: ["serve", "--host", "0.0.0.0", "--port", "8080"]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - soldecoders
